<!doctype html>
<html lang="nl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>De Oost — Stoffenbibliotheek</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
<style>
:root{--bg:#f7f3ed;--paper:#fffaf3;--ink:#2f2a25;--muted:#7d746b;--line:rgba(74,69,64,.18);--accent:#b38241;--dark:#171512}
*{box-sizing:border-box} body{margin:0;background:var(--bg);color:var(--ink);font-family:Inter,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}.wrap{max-width:1240px;margin:0 auto;padding:32px 18px 46px}.hero{display:flex;align-items:flex-end;justify-content:space-between;gap:18px;margin-bottom:22px}.eyebrow{font-size:12px;letter-spacing:.14em;text-transform:uppercase;color:var(--accent);font-weight:700}.title{font-family:Georgia,serif;font-size:clamp(32px,5vw,58px);line-height:.95;margin:8px 0;color:var(--dark)}.sub{max-width:720px;color:var(--muted);line-height:1.55}.panel{background:rgba(255,250,243,.82);border:1px solid var(--line);border-radius:24px;padding:18px;box-shadow:0 18px 60px rgba(40,32,24,.08)}.toolbar{display:grid;grid-template-columns:1fr auto;gap:12px;margin-bottom:14px}.search{width:100%;border:1px solid var(--line);border-radius:999px;padding:13px 16px;background:white;font:inherit}.chips{display:flex;gap:8px;flex-wrap:wrap}.chip{border:1px solid var(--line);background:#fff;border-radius:999px;padding:10px 13px;font:inherit;cursor:pointer}.chip.active{background:var(--dark);color:#fff;border-color:var(--dark)}.filters{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:12px;margin-bottom:18px}.field label{display:block;font-size:12px;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);font-weight:700;margin:0 0 6px}.field select{width:100%;border:1px solid var(--line);border-radius:14px;padding:11px;background:#fff;font:inherit}.head{display:flex;justify-content:space-between;gap:12px;align-items:center;margin:14px 0}.count{color:var(--muted)}.grid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:16px}.card{background:#fff;border:1px solid var(--line);border-radius:22px;overflow:hidden;box-shadow:0 10px 30px rgba(40,32,24,.06);display:flex;flex-direction:column}.img{height:180px;background:#e8e0d4;position:relative;overflow:hidden}.img img{width:100%;height:100%;object-fit:cover;display:block}.actions{position:absolute;right:10px;top:10px;display:flex;gap:7px}.icon{width:36px;height:36px;border-radius:50%;border:1px solid rgba(255,255,255,.55);background:rgba(23,21,18,.75);color:white;display:grid;place-items:center;cursor:pointer}.content{padding:15px}.name{font-family:Georgia,serif;font-size:21px;line-height:1.05;margin-bottom:7px}.meta{color:var(--muted);font-size:14px;line-height:1.45}.tags{display:flex;gap:6px;flex-wrap:wrap;margin-top:12px}.tag{font-size:12px;border:1px solid var(--line);border-radius:999px;padding:5px 8px;background:#faf7f0}.buttons{display:flex;gap:8px;flex-wrap:wrap;padding:0 15px 15px;margin-top:auto}.btn{border:1px solid var(--line);border-radius:999px;padding:10px 12px;background:#fff;color:inherit;text-decoration:none;cursor:pointer;font:inherit}.btn.primary{background:var(--accent);border-color:var(--accent);color:#fff}.modal{position:fixed;inset:0;background:rgba(20,16,12,.68);display:none;align-items:center;justify-content:center;padding:18px;z-index:20}.box{background:#fffaf3;border-radius:24px;max-width:920px;width:100%;max-height:88vh;overflow:auto;position:relative}.close{position:absolute;right:12px;top:12px;width:40px;height:40px;border-radius:50%;border:0;background:#171512;color:white;font-size:24px;cursor:pointer}.modal-grid{display:grid;grid-template-columns:42% 1fr}.modal-media{min-height:360px;background:#e6ded0}.modal-media img{width:100%;height:100%;object-fit:cover}.modal-content{padding:30px}.info-title{font-family:Georgia,serif;font-size:34px;line-height:1;margin:0 0 8px}.info-section{margin-top:18px}.info-section h3{font-size:12px;text-transform:uppercase;letter-spacing:.12em;color:var(--accent);margin:0 0 7px}.empty{padding:40px;text-align:center;color:var(--muted)}@media(max-width:850px){.toolbar{grid-template-columns:1fr}.filters{grid-template-columns:1fr 1fr}.grid{grid-template-columns:1fr 1fr}.modal-grid{grid-template-columns:1fr}.modal-media{min-height:240px}}@media(max-width:560px){.filters,.grid{grid-template-columns:1fr}.hero{display:block}.wrap{padding:22px 12px}.panel{padding:12px}}
</style>
</head>
<body>
<div class="wrap">
  <div class="hero">
    <div>
      <div class="eyebrow">De Oost Bespoke Tailoring</div>
      <h1 class="title">Stoffenbibliotheek</h1>
      <div class="sub">Blader door voorbeeldstoffen, filter op materiaal, weving, patroon, kleur en gebruik, en open een stof direct in de configurator.</div>
    </div>
    <div class="chips"><button class="chip active" id="scopeAll" onclick="setScope('all')">Alle stoffen</button><button class="chip" id="scopeRecommended" onclick="setScope('recommended')">Aanbevolen filter</button></div>
  </div>
  <div class="panel">
    <div class="toolbar"><input class="search" id="search" placeholder="Zoek op naam, leverancier, bunch, stofnummer, kleur…" oninput="state.search=this.value;render()"><div class="chips"><button class="chip" onclick="resetFilters()">Wis filters</button></div></div>
    <div class="filters" id="filters"></div>
    <div class="head"><strong id="resultTitle">Alle stoffen</strong><span class="count" id="count"></span></div>
    <div class="grid" id="grid"></div>
  </div>
</div>
<div class="modal" id="modal" onclick="if(event.target===this)closeModal()"><div class="box"><button class="close" onclick="closeModal()">×</button><div class="modal-grid"><div class="modal-media" id="modalMedia"></div><div class="modal-content" id="modalContent"></div></div></div></div>
<script src="stoffen.js"></script>
<script>
const STOFFEN=(window.DEOST_STOFFEN||[]).filter(s=>s.actief!==false);
const QS=new URLSearchParams(location.search);
const state={search:QS.get('zoek')||'',scope:QS.get('scope')||'all',filters:{materiaal:QS.get('materiaal')||'alle',weving:QS.get('weving')||'alle',patroon:QS.get('patroon')||'alle',kleur:QS.get('kleur')||'alle',gebruik:QS.get('gebruik')||'alle',geschiktVoor:QS.get('geschiktVoor')||'alle'}};
const filterDefs=[['geschiktVoor','Geschikt voor'],['materiaal','Materiaal'],['weving','Weving'],['patroon','Patroon'],['kleur','Kleur'],['gebruik','Gebruik']];
function label(v){return String(v||'').replaceAll('_',' ')}
function vals(key){const set=new Set();STOFFEN.forEach(s=>{const v=s[key];if(Array.isArray(v))v.forEach(x=>set.add(x));else if(v)set.add(v)});return [...set].sort()}
function renderFilters(){document.getElementById('filters').innerHTML=filterDefs.map(([key,name])=>`<div class="field"><label>${name}</label><select onchange="state.filters.${key}=this.value;render()"><option value="alle">Alle ${name.toLowerCase()}</option>${vals(key).map(v=>`<option value="${v}" ${state.filters[key]===v?'selected':''}>${label(v)}</option>`).join('')}</select></div>`).join('')}
function match(v,f){if(!f||f==='alle')return true;if(Array.isArray(v))return v.includes(f);return String(v||'')===String(f)}
function searchMatch(s){const q=state.search.trim().toLowerCase();if(!q)return true;return [s.id,s.naam,s.leverancier,s.bunch,s.stofnummer,s.kleur,s.weving,s.patroon,s.prijsGroep,...(s.materiaal||[]),...(s.klantLabels||[])].filter(Boolean).join(' ').toLowerCase().includes(q)}
function filtered(){return STOFFEN.filter(s=>searchMatch(s)&&Object.entries(state.filters).every(([k,f])=>match(s[k],f)))}
function card(s){const img=s.swatch||s.closeup||'';return `<div class="card"><div class="img"><img src="${img}" alt="${s.naam}" onerror="this.style.display='none'"><div class="actions"><button class="icon" onclick="openInfo('${s.id}')"><i class="ti ti-info-circle"></i></button></div></div><div class="content"><div class="name">${s.naam}</div><div class="meta">${s.leverancier||''}${s.bunch?' · '+s.bunch:''} · ${s.stofnummer||''}<br>${(s.materiaal||[]).join('/')} · ${label(s.weving)} · ${label(s.patroon)} · ${label(s.kleur)}</div><div class="tags">${(s.klantLabels||[]).map(t=>`<span class="tag">${t}</span>`).join('')}<span class="tag">Prijs ${s.prijsGroep||''}</span></div></div><div class="buttons"><button class="btn" onclick="openInfo('${s.id}')">Details</button><a class="btn primary" href="deoost_stijlconfigurator.html?stof=${encodeURIComponent(s.id)}">Gebruik in configurator</a>${s.seoUrl?`<a class="btn" href="${s.seoUrl}" target="_blank" rel="noopener">Stofpagina</a>`:''}</div></div>`}
function render(){renderFilters();const arr=filtered();document.getElementById('grid').innerHTML=arr.map(card).join('')||'<div class="empty">Geen stoffen gevonden. Wis filters of kies “Alle”.</div>';document.getElementById('count').textContent=arr.length+' resultaat'+(arr.length===1?'':'en');document.getElementById('resultTitle').textContent='Stoffenbibliotheek';document.getElementById('search').value=state.search;document.getElementById('scopeAll').className='chip active';}
function resetFilters(){state.search='';Object.keys(state.filters).forEach(k=>state.filters[k]='alle');render()}
function setScope(scope){state.scope=scope;render()}
function openInfo(id){const s=STOFFEN.find(x=>x.id===id);if(!s)return;document.getElementById('modalMedia').innerHTML=`<img src="${s.closeup||s.swatch||''}" alt="${s.naam}" onerror="this.style.display='none'">`;document.getElementById('modalContent').innerHTML=`<h2 class="info-title">${s.naam}</h2><div class="meta">${s.leverancier||''}${s.bunch?' · '+s.bunch:''} · ${s.stofnummer||''} · Prijsgroep ${s.prijsGroep||''}</div><div class="info-section"><h3>Eigenschappen</h3><p>Materiaal: ${(s.materiaal||[]).join(', ')}<br>Weving: ${label(s.weving)}<br>Patroon: ${label(s.patroon)}<br>Kleur: ${label(s.kleur)}${s.patroonkleur?'<br>Patroonkleur: '+label(s.patroonkleur):''}</p></div><div class="info-section"><h3>Uitleg</h3><p>${s.korteUitleg||''}</p></div><div class="info-section"><h3>Advies</h3><p>${s.advies||''}</p></div><div class="buttons"><a class="btn primary" href="deoost_stijlconfigurator.html?stof=${encodeURIComponent(s.id)}">Gebruik in configurator</a>${s.blogUrl?`<a class="btn" href="${s.blogUrl}" target="_blank" rel="noopener">Gerelateerde blog</a>`:''}</div>`;document.getElementById('modal').style.display='flex'}
function closeModal(){document.getElementById('modal').style.display='none'}
render();
</script>
</body>
</html>
