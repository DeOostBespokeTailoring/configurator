<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>De Oost — Voeringenbibliotheek</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.44.0/tabler-icons.min.css">
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{--ink:#1a1814;--muted:#6b6560;--line:rgba(74,69,64,.2);--soft:#f0ece4;--paper:#fff;--bg:#faf8f5;--gold:#8B6F47;--dark:#1a1814;}
body{font-family:'Roboto',sans-serif;font-weight:300;color:var(--ink);background:var(--bg);padding:1.5rem 1rem;}
.wrap{max-width:1180px;margin:0 auto;}
.cfg-header{border-bottom:.5px solid var(--line);padding:1.25rem 0 .875rem;margin-bottom:1.5rem;display:flex;justify-content:space-between;align-items:flex-end;gap:1rem;}
.cfg-header h1{font-size:28px;font-weight:300;letter-spacing:.05em;}
.cfg-header p{font-size:12px;color:var(--muted);margin-top:3px;line-height:1.5;max-width:680px;}
.btn{border:.5px solid var(--dark);background:var(--dark);color:white;border-radius:4px;padding:10px 14px;font-family:'Roboto',sans-serif;font-size:11px;text-transform:uppercase;letter-spacing:.08em;cursor:pointer;text-decoration:none;display:inline-flex;align-items:center;gap:7px;}
.btn.secondary{background:white;color:var(--ink);border-color:var(--line)}
.layout{display:grid;grid-template-columns:260px 1fr;gap:1.4rem;align-items:start;}
.panel{background:white;border:.5px solid var(--line);border-radius:8px;padding:1rem;}
.side{position:sticky;top:1rem;}
.side-title{font-size:20px;font-weight:300;margin-bottom:.25rem;}
.side-desc{font-size:12px;color:var(--muted);line-height:1.45;margin-bottom:1rem;}
.field{margin-bottom:.7rem}.field label{display:block;font-size:10px;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);margin-bottom:4px}.field select,.field input{width:100%;border:.5px solid var(--line);border-radius:4px;background:#fff;padding:9px 10px;font-family:'Roboto',sans-serif;font-size:13px;color:var(--ink);font-weight:300;}
.library-head{display:flex;justify-content:space-between;align-items:flex-end;gap:1rem;margin-bottom:1rem;}.result-title{font-size:22px;font-weight:300}.result-sub{font-size:12px;color:var(--muted);margin-top:3px}.count{font-size:12px;color:var(--muted)}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(210px,1fr));gap:12px}.card{border:.5px solid var(--line);border-radius:8px;overflow:hidden;background:white;transition:.2s;}.card:hover{border-color:var(--ink);transform:translateY(-1px)}.img{height:160px;background:#f1ede6;position:relative;overflow:hidden}.img img{width:100%;height:100%;object-fit:cover}.actions{position:absolute;left:8px;right:8px;bottom:8px;display:flex;justify-content:space-between;gap:6px}.icon{width:28px;height:28px;border-radius:4px;background:rgba(255,255,255,.92);border:.5px solid var(--line);cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--ink);font-size:14px}.content{padding:.8rem}.name{font-size:18px;line-height:1.1;margin-bottom:5px;font-weight:300}.meta{font-size:11px;color:var(--muted);line-height:1.45}.tags{display:flex;gap:4px;flex-wrap:wrap;margin-top:8px}.tag{font-size:9px;background:var(--soft);border:.5px solid rgba(74,69,64,.15);border-radius:3px;padding:2px 6px;color:var(--muted)}.buttons{display:flex;gap:6px;flex-wrap:wrap;padding:0 .8rem .8rem}.empty{padding:2rem;color:var(--muted);text-align:center;border:.5px dashed var(--line);border-radius:8px;background:#fbfaf7}
.modal{position:fixed;inset:0;background:rgba(10,8,6,.78);z-index:9998;display:none;align-items:center;justify-content:center;padding:1rem}.box{background:#faf8f5;border-radius:10px;max-width:760px;width:100%;max-height:90vh;overflow:auto;position:relative}.close{position:absolute;top:10px;right:10px;width:30px;height:30px;border-radius:50%;border:none;background:var(--dark);color:white;cursor:pointer;font-size:18px;line-height:1}.media{width:100%;aspect-ratio:16/9;background:#f0ece4;overflow:hidden;border-radius:10px 10px 0 0}.media img,.media video{width:100%;height:100%;object-fit:cover}.modal-content{padding:1.25rem}.modal-title{font-size:24px;font-weight:300;margin-bottom:3px}.section-title{font-size:10px;text-transform:uppercase;letter-spacing:.08em;color:var(--gold);margin-bottom:4px}.text{font-size:13px;color:var(--ink);line-height:1.6;margin-bottom:1rem}
@media(max-width:880px){.layout{grid-template-columns:1fr}.side{position:static}.cfg-header{display:block}.grid{grid-template-columns:repeat(2,minmax(0,1fr))}}@media(max-width:560px){.grid{grid-template-columns:1fr}body{padding:1rem .75rem}}
</style>
</head>
<body>
<div class="wrap">
  <div class="cfg-header"><div><h1>Voeringenbibliotheek</h1><p>Blader door voeringen, filter op kleur en uitstraling, en gebruik dezelfde swatch/close-up/logica als in de configurator.</p></div><a class="btn secondary" href="deoost_stijlconfigurator.html">Terug naar configurator</a></div>
  <div class="layout"><aside class="side panel"><div class="side-title">Filters</div><div class="side-desc">Elke filter staat standaard op alle opties.</div><div class="field"><label>Zoeken</label><input id="search" oninput="state.search=this.value;render()" placeholder="Zoek voering…"></div><div class="field"><label>Kleur</label><select id="kleur" onchange="state.kleur=this.value;render()"></select></div><div class="field"><label>Materiaal</label><select id="materiaal" onchange="state.materiaal=this.value;render()"></select></div><div class="field"><label>Uitstraling</label><select id="uitstraling" onchange="state.uitstraling=this.value;render()"></select></div><button class="btn secondary" onclick="resetFilters()">Wis filters</button></aside><main><div class="library-head"><div><div class="result-title">Voeringen</div><div class="result-sub">Kies een rustige basisvoering of een zichtbare accentvoering.</div></div><div class="count" id="count"></div></div><div id="grid" class="grid"></div></main></div>
</div>
<div id="modal" class="modal" onclick="if(event.target===this)closeModal()"><div class="box"><button class="close" onclick="closeModal()">×</button><div id="media" class="media"></div><div id="content" class="modal-content"></div></div></div>
<script src="voeringen.js"></script>
<script>
const VOERINGEN=(window.DEOST_VOERINGEN||[]).filter(v=>v.actief!==false);
let state={search:'',kleur:'alle',materiaal:'alle',uitstraling:'alle'};
function uniq(values){return [...new Set(values.filter(Boolean))].sort((a,b)=>a.localeCompare(b,'nl'))}
function options(id,label,values){const el=document.getElementById(id);el.innerHTML=`<option value="alle">Alle ${label}</option>`+values.map(v=>`<option value="${esc(v)}">${esc(v)}</option>`).join('')}
function esc(s){return String(s||'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[m]))}
function init(){options('kleur','kleuren',uniq(VOERINGEN.map(v=>v.kleur)));options('materiaal','materialen',uniq(VOERINGEN.map(v=>v.materiaal)));options('uitstraling','uitstralingen',uniq(VOERINGEN.flatMap(v=>v.uitstraling||[])));render()}
function match(v){const q=state.search.trim().toLowerCase();if(q&&!([v.id,v.naam,v.kleur,v.materiaal,...(v.uitstraling||[]),...(v.klantLabels||[])].join(' ').toLowerCase().includes(q)))return false;if(state.kleur!=='alle'&&v.kleur!==state.kleur)return false;if(state.materiaal!=='alle'&&v.materiaal!==state.materiaal)return false;if(state.uitstraling!=='alle'&&!(v.uitstraling||[]).includes(state.uitstraling))return false;return true}
function card(v){const img=v.swatch||v.closeup||'';return `<article class="card"><div class="img">${img?`<img src="${esc(img)}" alt="${esc(v.naam)}" onerror="this.style.display='none'">`:''}<div class="actions"><button class="icon" onclick="openZoom('${esc(v.id)}')"><i class="ti ti-zoom-in"></i></button><button class="icon" onclick="openInfo('${esc(v.id)}')"><i class="ti ti-info-circle"></i></button></div></div><div class="content"><div class="name">${esc(v.naam)}</div><div class="meta">${esc(v.materiaal||'')} · ${esc(v.kleur||'')}<br>${esc((v.uitstraling||[]).join(' · '))}</div><div class="tags">${(v.klantLabels||[]).map(t=>`<span class="tag">${esc(t)}</span>`).join('')}</div></div><div class="buttons"><button class="btn secondary" onclick="openInfo('${esc(v.id)}')">Details</button></div></article>`}
function render(){const list=VOERINGEN.filter(match);document.getElementById('count').textContent=`${list.length} resultaat${list.length===1?'':'en'}`;document.getElementById('grid').innerHTML=list.length?list.map(card).join(''):'<div class="empty">Geen voeringen gevonden. Wis een filter.</div>'}
function resetFilters(){state={search:'',kleur:'alle',materiaal:'alle',uitstraling:'alle'};document.getElementById('search').value='';['kleur','materiaal','uitstraling'].forEach(id=>document.getElementById(id).value='alle');render()}
function get(id){return VOERINGEN.find(v=>v.id===id)}
function openZoom(id){const v=get(id);if(!v)return;document.getElementById('media').innerHTML=`<img src="${esc(v.closeup||v.swatch||'')}" alt="${esc(v.naam)}">`;document.getElementById('content').innerHTML=`<div class="modal-title">${esc(v.naam)}</div><div class="text">${esc(v.materiaal||'')} · ${esc(v.kleur||'')}</div>`;document.getElementById('modal').style.display='flex'}
function openInfo(id){const v=get(id);if(!v)return;document.getElementById('media').innerHTML=v.video?`<video autoplay muted loop playsinline><source src="${esc(v.video)}" type="video/mp4"></video>`:`<img src="${esc(v.closeup||v.swatch||'')}" alt="${esc(v.naam)}">`;document.getElementById('content').innerHTML=`<div class="modal-title">${esc(v.naam)}</div><div class="text">${esc(v.materiaal||'')} · ${esc(v.kleur||'')}</div>${v.korteUitleg?`<div class="section-title">Uitleg</div><div class="text">${esc(v.korteUitleg)}</div>`:''}${v.advies?`<div class="section-title">Advies</div><div class="text">${esc(v.advies)}</div>`:''}`;document.getElementById('modal').style.display='flex'}
function closeModal(){document.getElementById('modal').style.display='none'}
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeModal()});init();
</script>
</body>
</html>
