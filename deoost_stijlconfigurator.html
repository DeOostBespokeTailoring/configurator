<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>De Oost — Stijlconfigurator</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.44.0/tabler-icons.min.css">

<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Jost',sans-serif;font-weight:300;color:#1a1814;background:#faf8f5;padding:1.5rem 1rem;}
.wrap{max-width:860px;margin:0 auto;}
.cfg-header{border-bottom:0.5px solid rgba(74,69,64,.2);padding:1.25rem 0 .875rem;margin-bottom:1.5rem;display:flex;justify-content:space-between;align-items:flex-end;}
.cfg-header h1{font-family:'Cormorant Garamond',serif;font-size:24px;font-weight:500;letter-spacing:.05em;}
.cfg-header p{font-size:12px;color:#6b6560;margin-top:3px;}

/* LAYOUT: sidebar + main */
.layout{display:grid;grid-template-columns:220px 1fr;gap:1.5rem;align-items:start;}
@media(max-width:640px){.layout{grid-template-columns:1fr;}}

/* SIDEBAR NAV */
.sidebar{position:sticky;top:1rem;}
.kled-tabs{display:flex;gap:6px;margin-bottom:1rem;}
.kled-tab{flex:1;padding:7px 4px;text-align:center;font-size:11px;letter-spacing:.05em;text-transform:uppercase;border:0.5px solid rgba(74,69,64,.2);border-radius:4px;cursor:pointer;transition:all .2s;background:white;}
.kled-tab.active{background:#1a1814;border-color:#1a1814;color:white;}
.kled-tab:hover:not(.active){border-color:#4a4540;}
.nav-list{list-style:none;}
.nav-item{display:flex;align-items:center;gap:8px;padding:8px 10px;border-radius:6px;cursor:pointer;font-size:12px;color:#6b6560;transition:all .2s;margin-bottom:2px;border:0.5px solid transparent;}
.nav-item:hover{background:#f0ece4;color:#1a1814;}
.nav-item.active{background:#1a1814;color:white;}
.nav-item.done{color:#8B6F47;border-color:rgba(139,111,71,.2);}
.nav-item.done .nav-check{opacity:1;}
.nav-check{width:16px;height:16px;border-radius:50%;background:#8B6F47;display:flex;align-items:center;justify-content:center;flex-shrink:0;opacity:0;transition:opacity .2s;}
.nav-icon{font-size:14px;flex-shrink:0;}
.nav-label{flex:1;line-height:1.3;}

/* MAIN */
.main{}
.step-header{margin-bottom:1.25rem;}
.step-title{font-family:'Cormorant Garamond',serif;font-size:20px;font-weight:500;margin-bottom:4px;}
.step-sub{font-size:12px;color:#6b6560;line-height:1.5;}
.step-optional{display:inline-block;background:#f0ece4;border-radius:3px;padding:1px 6px;font-size:10px;color:#8B6F47;margin-left:6px;letter-spacing:.04em;}

/* OPTIE GRID */
.opt-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:10px;margin-bottom:1.25rem;}
.opt-card{border:0.5px solid rgba(74,69,64,.2);border-radius:8px;overflow:hidden;cursor:pointer;transition:all .2s;background:white;position:relative;}
.opt-card:hover{border-color:#4a4540;transform:translateY(-1px);}
.opt-card.selected{border-color:#1a1814;border-width:1.5px;}
.opt-card.selected::after{content:'✓';position:absolute;top:6px;right:6px;width:20px;height:20px;border-radius:50%;background:#1a1814;color:white;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:500;}
.opt-img{width:100%;aspect-ratio:3/4;background:#f7f4ef;display:flex;align-items:center;justify-content:center;overflow:hidden;position:relative;}
.opt-img img{width:100%;height:100%;object-fit:contain;padding:8px;}
.opt-zoom{position:absolute;bottom:5px;right:5px;width:22px;height:22px;border-radius:4px;background:rgba(255,255,255,.9);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;opacity:0;transition:opacity .2s;font-size:12px;color:#1a1814;}
.opt-img:hover .opt-zoom{opacity:1;}
.opt-info{padding:8px 8px 10px;}
.opt-name{font-size:12px;font-weight:500;color:#1a1814;margin-bottom:2px;line-height:1.3;}
.opt-desc{font-size:11px;color:#6b6560;line-height:1.4;}

/* SAMENVATTING SIDEBAR */
.summary-panel{border:0.5px solid rgba(74,69,64,.2);border-radius:8px;padding:1rem;background:white;margin-top:1rem;}
.summary-title{font-family:'Cormorant Garamond',serif;font-size:14px;font-weight:500;margin-bottom:.75rem;color:#1a1814;}
.summary-item{display:flex;gap:8px;margin-bottom:6px;align-items:flex-start;}
.summary-thumb{width:36px;height:36px;border-radius:4px;background:#f7f4ef;overflow:hidden;flex-shrink:0;}
.summary-thumb img{width:100%;height:100%;object-fit:contain;}
.summary-text{flex:1;}
.summary-cat{font-size:10px;color:#8B6F47;text-transform:uppercase;letter-spacing:.05em;}
.summary-val{font-size:11px;color:#1a1814;line-height:1.3;}
.summary-empty{font-size:11px;color:#6b6560;font-style:italic;}

/* NAV BUTTONS */
.step-nav{display:flex;justify-content:space-between;align-items:center;margin-top:1.5rem;padding-top:1rem;border-top:0.5px solid rgba(74,69,64,.2);}
.btn{font-family:'Jost',sans-serif;font-size:11px;font-weight:400;letter-spacing:.07em;text-transform:uppercase;padding:9px 20px;border-radius:4px;cursor:pointer;transition:all .2s;border:none;}
.btn-ghost{background:transparent;border:0.5px solid rgba(74,69,64,.2);color:#6b6560;}
.btn-ghost:hover{border-color:#4a4540;color:#1a1814;}
.btn-primary{background:#1a1814;color:#faf8f5;}
.btn-primary:hover{opacity:.85;}
.btn-accent{background:#8B6F47;color:white;}
.btn-accent:hover{background:#7a6040;}
.btn-skip{background:transparent;border:none;font-size:11px;color:#8B6F47;cursor:pointer;letter-spacing:.04em;padding:4px 8px;}
.btn-skip:hover{text-decoration:underline;}

/* SAMENVATTING PAGINA */
.final-summary{display:none;}
.final-summary.active{display:block;}
.sum-kled-block{margin-bottom:2rem;}
.sum-kled-title{font-family:'Cormorant Garamond',serif;font-size:18px;font-weight:500;margin-bottom:1rem;padding-bottom:.5rem;border-bottom:0.5px solid rgba(74,69,64,.2);}
.sum-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:8px;margin-bottom:.5rem;}
.sum-card{border:0.5px solid rgba(74,69,64,.2);border-radius:6px;overflow:hidden;background:white;}
.sum-card-img{width:100%;aspect-ratio:1;background:#f7f4ef;}
.sum-card-img img{width:100%;height:100%;object-fit:contain;padding:4px;}
.sum-card-info{padding:6px;}
.sum-card-cat{font-size:9px;color:#8B6F47;text-transform:uppercase;letter-spacing:.05em;}
.sum-card-val{font-size:11px;color:#1a1814;font-weight:500;}

/* LIGHTBOX */
.lb-overlay{position:fixed;inset:0;background:rgba(10,8,6,.88);z-index:9999;display:flex;align-items:center;justify-content:center;}
.lb-box{position:relative;max-width:90vw;max-height:90vh;display:flex;flex-direction:column;align-items:center;}
.lb-img{max-width:min(560px,88vw);max-height:82vh;object-fit:contain;border-radius:8px;background:#f7f4ef;padding:20px;}
.lb-caption{margin-top:12px;color:rgba(255,255,255,.8);font-family:'Jost',sans-serif;font-size:14px;font-weight:300;text-align:center;}
.lb-close{position:absolute;top:-16px;right:-16px;width:34px;height:34px;border-radius:50%;background:rgba(255,255,255,.15);border:none;cursor:pointer;color:white;font-size:20px;line-height:1;display:flex;align-items:center;justify-content:center;}
.lb-close:hover{background:rgba(255,255,255,.25);}

/* PROGRESS */
.progress-bar{height:2px;background:rgba(74,69,64,.1);border-radius:1px;margin-bottom:1.5rem;overflow:hidden;}
.progress-fill{height:100%;background:#8B6F47;border-radius:1px;transition:width .3s ease;}
</style>
</head>
<body>
<div class="wrap">
  <div class="cfg-header">
    <div>
      <h1>Stijlconfigurator</h1>
      <p>De Oost Bespoke Tailoring — configureer uw garderobe stap voor stap</p>
    </div>
  </div>

  <div id="mainConfig">
    <div class="layout">
      <!-- SIDEBAR -->
      <div class="sidebar">
        <div class="kled-tabs" id="kledTabs"></div>
        <ul class="nav-list" id="navList"></ul>
        <div class="summary-panel">
          <div class="summary-title">Uw keuzes</div>
          <div id="summaryList"><span class="summary-empty">Nog geen keuzes gemaakt</span></div>
        </div>
      </div>
      <!-- MAIN -->
      <div class="main">
        <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
        <div id="stepContent"></div>
      </div>
    </div>
  </div>

  <div id="finalSummary" style="display:none">
    <div id="finalContent"></div>
    <div style="display:flex;gap:12px;margin-top:2rem;padding-top:1rem;border-top:0.5px solid rgba(74,69,64,.2);">
      <button class="btn btn-ghost" onclick="document.getElementById('finalSummary').style.display='none';document.getElementById('mainConfig').style.display='block'">← Terug aanpassen</button>
      <button class="btn btn-accent" onclick="window.location.href='deoost_kleding.html?stijl='+encodeURIComponent(getSamenvatting())">Doorgaan naar bestelling →</button>
    </div>
  </div>
</div>

<!-- LIGHTBOX -->
<div id="lb" style="display:none" class="lb-overlay" onclick="if(event.target===this)this.style.display='none'">
  <div class="lb-box">
    <button class="lb-close" onclick="document.getElementById('lb').style.display='none'">×</button>
    <img id="lbImg" class="lb-img" src="" alt="">
    <div id="lbCaption" class="lb-caption"></div>
  </div>
</div>

let actieveKled = 'Jas';
let actieveStap = 0;
let keuzes = {};

function huidigeStappen() {
  return STAPPEN[actieveKled] || [];
}

function huidigeStap() {
  return huidigeStappen()[actieveStap];
}

function getOpties(stap) {
  if (typeof stap.opties === 'function') return stap.opties(keuzes);
  return stap.opties;
}

function renderKledTabs() {
  const tabs = document.getElementById('kledTabs');
  tabs.innerHTML = '';
  KLEDINGSTUKKEN.forEach(k => {
    const t = document.createElement('div');
    t.className = 'kled-tab' + (k === actieveKled ? ' active' : '');
    t.textContent = k;
    t.onclick = () => { actieveKled = k; actieveStap = 0; render(); };
    tabs.appendChild(t);
  });
}

function renderNav() {
  const nav = document.getElementById('navList');
  nav.innerHTML = '';
  huidigeStappen().forEach((stap, i) => {
    const heeftKeuze = keuzes[stap.id];
    const li = document.createElement('li');
    li.className = 'nav-item' + (i === actieveStap ? ' active' : '') + (heeftKeuze ? ' done' : '');
    li.innerHTML = `
      <i class="ti ${stap.icon} nav-icon"></i>
      <span class="nav-label">${stap.label}${!stap.verplicht ? ' <span style="opacity:.6;font-size:10px">(opt.)</span>' : ''}</span>
      <div class="nav-check"><i class="ti ti-check" style="font-size:9px;color:white"></i></div>`;
    li.onclick = () => { actieveStap = i; renderStep(); renderNav(); updateProgress(); };
    nav.appendChild(li);
  });
}

function renderSummaryPanel() {
  const list = document.getElementById('summaryList');
  const stappen = huidigeStappen();
  const items = stappen.filter(s => keuzes[s.id]);
  if (!items.length) {
    list.innerHTML = '<span class="summary-empty">Nog geen keuzes gemaakt</span>';
    return;
  }
  list.innerHTML = items.map(s => {
    const opties = getOpties(s);
    const opt = opties.find(o => o.id === keuzes[s.id]);
    if (!opt) return '';
    return `<div class="summary-item">
      <div class="summary-thumb"><img src="${IMG}${opt.img}" alt="${opt.naam}" onerror="this.style.display='none'"></div>
      <div class="summary-text">
        <div class="summary-cat">${s.label}</div>
        <div class="summary-val">${opt.naam}</div>
      </div>
    </div>`;
  }).join('');
}

function renderStep() {
  const stap = huidigeStap();
  if (!stap) return;
  const opties = getOpties(stap);
  const content = document.getElementById('stepContent');
  content.innerHTML = `
    <div class="step-header">
      <div class="step-title">${stap.label} ${!stap.verplicht ? '<span class="step-optional">Optioneel</span>' : ''}</div>
    </div>
    <div class="opt-grid" id="optGrid"></div>
    <div class="step-nav">
      <button class="btn btn-ghost" onclick="prevStap()" ${actieveStap === 0 ? 'style="visibility:hidden"' : ''}>← Vorige</button>
      <div style="display:flex;gap:8px;align-items:center;">
        ${!stap.verplicht ? `<button class="btn-skip" onclick="slaOver()">Overslaan</button>` : ''}
        ${actieveStap < huidigeStappen().length - 1 ?
          `<button class="btn btn-primary" onclick="volgendeStap()">Volgende →</button>` :
          `<button class="btn btn-accent" onclick="toonSamenvatting()">Samenvatting bekijken →</button>`
        }
      </div>
    </div>`;

  const grid = document.getElementById('optGrid');
  opties.forEach(opt => {
    const c = document.createElement('div');
    c.className = 'opt-card' + (keuzes[stap.id] === opt.id ? ' selected' : '');
    c.innerHTML = `
      <div class="opt-img">
        <img src="${IMG}${opt.img}" alt="${opt.naam}" onerror="this.style.display='none'">
        <button class="opt-zoom" onclick="openLb('${IMG}${opt.img}','${opt.naam}',event)" title="Vergroot">
          <i class="ti ti-zoom-in"></i>
        </button>
      </div>
      <div class="opt-info">
        <div class="opt-name">${opt.naam}</div>
        ${opt.desc ? `<div class="opt-desc">${opt.desc}</div>` : ''}
      </div>`;
    c.onclick = () => {
      keuzes[stap.id] = opt.id;
      grid.querySelectorAll('.opt-card').forEach(x => x.classList.remove('selected'));
      c.classList.add('selected');
      renderNav();
      renderSummaryPanel();
    };
    grid.appendChild(c);
  });
}

function updateProgress() {
  const stappen = huidigeStappen();
  const pct = stappen.length ? ((actieveStap + 1) / stappen.length * 100) : 0;
  document.getElementById('progressFill').style.width = pct + '%';
}

function volgendeStap() {
  const stap = huidigeStap();
  if (stap && stap.verplicht && !keuzes[stap.id]) {
    alert('Maak eerst een keuze voor "' + stap.label + '" voordat u verder gaat.');
    return;
  }
  if (actieveStap < huidigeStappen().length - 1) {
    actieveStap++;
    render();
  }
}

function prevStap() {
  if (actieveStap > 0) { actieveStap--; render(); }
}

function slaOver() {
  delete keuzes[huidigeStap().id];
  volgendeStap();
}

function toonSamenvatting() {
  document.getElementById('mainConfig').style.display = 'none';
  const fin = document.getElementById('finalSummary');
  fin.style.display = 'block';
  const content = document.getElementById('finalContent');

  let html = '';
  KLEDINGSTUKKEN.forEach(kled => {
    const stappen = STAPPEN[kled];
    const items = stappen.filter(s => keuzes[s.id]);
    if (!items.length) return;
    html += `<div class="sum-kled-block"><div class="sum-kled-title">${kled}</div><div class="sum-grid">`;
    items.forEach(s => {
      const opties = typeof s.opties === 'function' ? s.opties(keuzes) : s.opties;
      const opt = opties.find(o => o.id === keuzes[s.id]);
      if (!opt) return;
      html += `<div class="sum-card">
        <div class="sum-card-img"><img src="${IMG}${opt.img}" alt="${opt.naam}" style="width:100%;height:100%;object-fit:contain;padding:4px" onerror="this.style.display='none'"></div>
        <div class="sum-card-info">
          <div class="sum-card-cat">${s.label}</div>
          <div class="sum-card-val">${opt.naam}</div>
        </div>
      </div>`;
    });
    html += '</div></div>';
  });
  content.innerHTML = html || '<p style="color:#6b6560;font-size:13px">Nog geen keuzes gemaakt.</p>';
}

function getSamenvatting() {
  const result = {};
  KLEDINGSTUKKEN.forEach(kled => {
    STAPPEN[kled].forEach(s => {
      if (keuzes[s.id]) result[s.id] = keuzes[s.id];
    });
  });
  return JSON.stringify(result);
}

function openLb(src, caption, e) {
  e.stopPropagation();
  document.getElementById('lbImg').src = src;
  document.getElementById('lbCaption').textContent = caption;
  document.getElementById('lb').style.display = 'flex';
}

document.addEventListener('keydown', e => {
  if (e.key === 'Escape') document.getElementById('lb').style.display = 'none';
});

function render() {
  renderKledTabs();
  renderNav();
  renderStep();
  renderSummaryPanel();
  updateProgress();
}

render();
</script>
